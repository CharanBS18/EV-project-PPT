<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

            darkMode: "class",

                        "surface-bright": "#31394d",

                        "inverse-on-surface": "#283044",
                        "outline-variant": "#3c4a42",

                        "inverse-primary": "#006c49",
                        "outline": "#86948a",

                        "surface-container": "#171f33",
                        "surface-container-highest": "#2d3449"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .neon-glow-primary {
            box-shadow: 0 0 15px 2px rgba(16, 185, 129, 0.4);
        }
        .glass-panel {
            background: rgba(11, 19, 38, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary/30 min-h-screen overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center bg-slate-900/40 backdrop-blur-xl w-full top-0 px-6 py-4 tonal-transition">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-emerald-400 text-3xl" data-icon="electric_bolt">electric_bolt</span>
<h1 class="font-['Space_Grotesk'] tracking-tighter text-2xl font-bold text-emerald-400">NEON</h1>
</div>
<div class="flex items-center gap-4">
<button class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center hover:opacity-80 transition-opacity active:duration-150">
<span class="material-symbols-outlined text-on-surface" data-icon="notifications">notifications</span>
</button>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary/20">
<img alt="Profile" class="w-full h-full object-cover" data-alt="Portrait of a young male user" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDU4WijkPtt0PWIM8K9aMAW3_cwfwEILhl37IQc6LpSeKIA_8-PkR99kcSS29DSiwYljWQPeMO2c9e4R_JD9b6H2t5jXNu-hdV84OB7IoXdYfE_xs6_X90_wbRowHAZ_IZwFU-xyhTmxEYP_1mErsu2rlvRseLpDFZJkIbq_SbEVxdGXTVZFOcpCbSY6cck7Ze4A-QzDSdqwBcOPrdb2GsT3TKWykOHd2nbI1vXImQEInlxJx1tfDpzJygM-q46c7fDRAntmEYhdK0"/>
</div>
</div>
</header>
<!-- Main Map Hero Area -->
<main class="relative w-full h-screen overflow-hidden">
<!-- Map Placeholder with data-location -->
<div class="absolute inset-0 z-0">
<img alt="Dark themed map" class="w-full h-full object-cover grayscale brightness-[0.3] contrast-[1.2]" data-location="New York City" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXOlWwK9tegFyEMVRIa6Ru5hAzpwS0MMN4tZyGU7T2gNTonzLbAXdnR5C7jzcGcDFZAaPqZzRajhIvp3d8M4KySh-6ep3E9ngpBQ07aHiviahDgmyd6wA7Q8OrF4pWz6evS6inYbZ4ZTxRCTlczBIsyAc1-kXAPCcTRm3P-rk3gfM95Gz0yRDnkUL0Vku8maWYKZmCABKvlxRgOq_2sSAOkm9vyCRcDNhIgX3PkutKhLPAp3pYsU0Vt1b0PREAyTk09MAWCZEi88o"/>
<!-- Map Overlay Gradients -->
<div class="absolute inset-0 bg-gradient-to-b from-background via-transparent to-background/80"></div>
<!-- Custom Map Pins (Simulated) -->
<div class="absolute top-1/3 left-1/4 group cursor-pointer">
<div class="w-4 h-4 bg-primary-container rounded-full neon-glow-primary border-2 border-on-primary"></div>
</div>
<div class="absolute top-1/2 left-2/3 group cursor-pointer">
<div class="w-4 h-4 bg-slate-500 rounded-full border-2 border-white/20"></div>
</div>
<!-- Selected Pin -->
<div class="absolute top-[45%] left-[48%] -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
<div class="relative">
<div class="absolute -inset-4 bg-primary/20 rounded-full blur-xl animate-pulse"></div>
<div class="relative w-8 h-8 bg-primary rounded-full flex items-center justify-center border-2 border-on-primary-container shadow-[0_0_20px_rgba(16,185,129,0.6)]">
<span class="material-symbols-outlined text-on-primary-container text-lg" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
</div>
<div class="mt-2 bg-surface-container-highest px-3 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase text-primary border border-primary/20">Active</div>
</div>
</div>
<!-- Floating Quick Search Bar -->
<div class="absolute top-24 left-0 right-0 z-20 px-6 flex flex-col items-center">
<div class="w-full max-w-md glass-panel rounded-full p-1.5 flex items-center gap-2 border border-outline-variant/15 shadow-2xl">
<div class="pl-4 flex items-center text-on-surface-variant">
<span class="material-symbols-outlined text-xl" data-icon="search">search</span>
</div>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-on-surface-variant/60 font-medium" placeholder="Search charging stations..." type="text"/>
<button class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-primary hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="my_location">my_location</span>
</button>
<button class="w-10 h-10 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center hover:opacity-90 transition-opacity">
<span class="material-symbols-outlined text-xl" data-icon="tune">tune</span>
</button>
</div>
</div>
<!-- Bottom Sheet (Station Details) -->
<div class="absolute bottom-24 left-1/2 -translate-x-1/2 w-[92%] max-w-lg z-30">
<div class="glass-panel rounded-xl border border-primary/10 overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
<!-- Inner glow effect -->
<div class="absolute inset-0 border-[1.5px] border-secondary/5 rounded-xl pointer-events-none"></div>
<div class="p-6">
<div class="w-12 h-1 bg-on-surface-variant/20 rounded-full mx-auto mb-6"></div>
<div class="flex justify-between items-start mb-4">
<div>
<h2 class="font-headline text-2xl font-bold tracking-tight text-on-surface">Supercharger - Central Park</h2>
<div class="flex items-center gap-2 mt-1">
<span class="flex h-2 w-2 rounded-full bg-primary animate-pulse"></span>
<p class="text-primary font-bold text-sm tracking-wide">Available (4/6 fast chargers)</p>
</div>
</div>
<div class="text-right">
<div class="font-headline text-2xl font-bold text-secondary">2.4 mi</div>
<div class="text-on-surface-variant text-xs font-medium uppercase tracking-tighter">8 min drive</div>
</div>
</div>
<!-- Bento Grid Info -->
<div class="grid grid-cols-2 gap-3 mb-6">
<div class="bg-surface-container-low/50 p-4 rounded-lg">
<p class="text-[10px] text-on-surface-variant uppercase tracking-widest font-bold mb-1">Max Power</p>
<div class="flex items-end gap-1">
<span class="font-headline text-xl font-bold">250</span>
<span class="text-xs font-bold text-on-surface-variant pb-1">kW</span>
</div>
</div>
<div class="bg-surface-container-low/50 p-4 rounded-lg">
<p class="text-[10px] text-on-surface-variant uppercase tracking-widest font-bold mb-1">Pricing</p>
<div class="flex items-end gap-1">
<span class="font-headline text-xl font-bold">$0.42</span>
<span class="text-xs font-bold text-on-surface-variant pb-1">/kWh</span>
</div>
</div>
</div>
<!-- Actions -->
<div class="flex gap-3">
<button class="flex-[2] py-4 bg-gradient-to-r from-primary to-primary-container rounded-full text-on-primary-container font-headline font-bold text-sm uppercase tracking-widest hover:opacity-90 transition-all flex items-center justify-center gap-2 shadow-lg shadow-primary/20 active:scale-95">
<span class="material-symbols-outlined text-xl" data-icon="navigation" style="font-variation-settings: 'FILL' 1;">navigation</span>
                            Navigate
                        </button>
<button class="flex-1 py-4 border-2 border-outline-variant/30 rounded-full text-on-surface font-headline font-bold text-sm uppercase tracking-widest hover:bg-surface-container-highest transition-colors active:scale-95">
                            Reserve
                        </button>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 right-0 z-50 flex justify-around items-center h-16 px-4 bg-slate-900/60 backdrop-blur-xl rounded-full mb-6 mx-auto max-w-xs w-[90%] shadow-[0_20px_50px_rgba(0,0,0,0.5)] no-border">
<!-- Map (Active) -->
<a class="flex flex-col items-center justify-center relative after:content-[''] after:absolute after:-bottom-2 after:w-1 after:h-1 after:bg-emerald-400 after:rounded-full scale-110 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined text-emerald-400" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
</a>
<!-- Saved -->
<a class="flex flex-col items-center justify-center text-slate-500 hover:text-emerald-200 transition-colors scale-110 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="bookmark">bookmark</span>
</a>
<!-- Wallet -->
<a class="flex flex-col items-center justify-center text-slate-500 hover:text-emerald-200 transition-colors scale-110 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
</a>
<!-- Settings -->
<a class="flex flex-col items-center justify-center text-slate-500 hover:text-emerald-200 transition-colors scale-110 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</a>
</nav>
</body></html>
